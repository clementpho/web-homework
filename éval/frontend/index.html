<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="login-view">
        <h2>Bienvenue</h2>
        <input type="text" id="username-input" placeholder="Entrez votre nom...">
        <button id="login-btn">Se connecter</button>
    </div>

    <div id="app-view">
        <div id="sidebar">
            <div class="sidebar-header">Salons</div>
            <ul class="chat-list" id="chat-list"></ul>
        </div>

        <div id="main-chat">
            <div class="chat-header" id="current-chat-name"></div>
            
            <div class="messages-container" id="messages-container">Séléctionnez un salon</div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Taper un message..." autocomplete="off">
                <button id="send-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
